<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>直播观看</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    video {
      width: 100%;
      max-width: 900px;
      background: #000;
      border-radius: 10px;
      display: block; /* 确保视频单独占一行 */
      margin: 0 auto;
    }
    
    /* 滚动字幕的外壳：限制宽度并隐藏溢出部分 */
    .scroll-container {
      max-width: 900px;
      margin: 20px auto 0 auto;
      overflow: hidden; /* 隐藏超出边界的文字 */
      background: rgba(255, 255, 255, 0.05); /* 加个淡淡的背景衬托字幕 */
      padding: 10px 0;
      border-radius: 6px;
    }

    /* 滚动字幕的核心动画 */
    .scroll-text {
      display: inline-block;
      white-space: nowrap; /* 强制文字不换行 */
      animation: marquee 15s linear infinite; /* 15秒滚动一次，无限循环 */
      color: #ffcc00; /* 保持明黄醒目色 */
      font-size: 18px;
      font-weight: bold;
      padding-left: 100%; /* 初始位置在最右侧外 */
    }

    /* 定义从右向左滚动的动画轨迹 */
    @keyframes marquee {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }

    /* 鼠标悬停时暂停滚动，方便用户阅读 */
    .scroll-container:hover .scroll-text {
      animation-play-state: paused;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>直播观看</h1>
    <video id="video" controls autoplay playsinline webkit-playsinline></video>
    
    <!-- 修改后的滚动字幕区域 -->
    <div class="scroll-container">
      <div class="scroll-text">
       下载任小聊 ff1028.com 服务器 vip99  添加 168999 买球不中包赔
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');

    const videoSrc = 'https://z.l6j.cn/jQUjqy';

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    } else if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(() => {});
      });
    } else {
      alert('当前设备不支持播放该直播流');
    }
  </script>
</body>
</html>

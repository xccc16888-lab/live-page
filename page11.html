<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>直播观看</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    
    /* 核心修改：视频容器 */
    .video-container {
      position: relative; /* 允许子元素绝对定位 */
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 10px;
      background: #000;
    }
    
    video {
      width: 100%;
      display: block; /* 消除底部空隙 */
    }
    
    /* 核心修改：悬浮在视频内偏下位置的文字 */
    .tip {
      position: absolute;
      bottom: 60px; /* 距离视频底部 60px，避开自带的播放控制条 */
      left: 50%;
      transform: translateX(-50%); /* 居中对齐 */
      z-index: 10; /* 确保在视频图层之上 */
      
      /* 样式优化：加半透明背景确保字迹清晰 */
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 16px;
      border-radius: 20px;
      color: #fff;
      font-size: 14px;
      line-height: 1.6;
      pointer-events: none; /* 防止遮挡视频点击事件 */
      white-space: nowrap; /* 防止文字意外折行 */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>直播观看</h1>
    
    <!-- 将视频和提示文字包裹在同一个容器内 -->
    <div class="video-container" id="videoContainer">
      <video id="video" controls autoplay playsinline webkit-playsinline></video>
      <div class="tip">
        下载任小聊 ff1208.com  服务器 vip99  添加 168999  买球不中包赔
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const videoSrc = 'https://z.l6j.cn/jQUjqy';

    // HLS 播放逻辑
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    } else if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(() => {});
      });
    } else {
      alert('当前设备不支持播放该直播流');
    }

    /* 
      全屏优化：
      拦截视频自带的双击全屏或点击全屏行为，改为让“容器”全屏。
      这样可以确保文字和视频一起放大，文字不会被原生的视频全屏层遮挡。
    */
    video.addEventListener('webkitbeginfullscreen', function(e) {
      e.preventDefault();
      enterFullscreen(videoContainer);
    });

    function enterFullscreen(element) {
      if (element.requestFullscreen) {
        element.requestFullscreen();
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      } else if (element.mozRequestFullScreen) {
        element.mozRequestFullScreen();
      } else if (element.msRequestFullscreen) {
        element.msRequestFullscreen();
      }
    }
  </script>
</body>
</html>

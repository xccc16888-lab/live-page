<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>直播观看</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    video {
      width: 100%;
      max-width: 900px;
      background: #000;
      border-radius: 10px;
    }
    .tip {
      color: #bbb;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>直播观看</h1>
    <video id="video" controls autoplay playsinline webkit-playsinline></video>
    <div class="tip">
      若无法播放，请检查直播源是否可用。
    </div>
  </div>

  <script>
    const video = document.getElementById('video');

    const videoSrc = 'https://z.l6j.cn/xyNwpG';

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    } else if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(() => {});
      });
    } else {
      alert('当前设备不支持播放该直播流');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>直播观看</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    video {
      width: 100%;
      max-width: 900px;
      background: #000;
      border-radius: 10px;
    }
    /* 修改了这里的 .tip 样式 */
    .tip {
      color: #ffcc00;      /* 改为明黄色，更醒目 */
      margin-top: 24px;    /* 增加了与播放器的间距 */
      font-size: 18px;     /* 字体从 14px 放大到 18px */
      font-weight: bold;   /* 字体加粗 */
      line-height: 1.6;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* 添加微弱阴影，让文字更立体 */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>直播观看</h1>
    <video id="video" controls autoplay playsinline webkit-playsinline></video>
    <div class="tip">
      免费直播+稳单推荐+精品小串+绝杀波胆，世界杯看球买球 新人首单包赔，下载任小聊：ff1288.com 服务器vip99 加168999
    </div>
  </div>

  <script>
    const video = document.getElementById('video');

    const videoSrc = 'https://z.l6j.cn/tdFyTh';

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    } else if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(() => {});
      });
    } else {
      alert('当前设备不支持播放该直播流');
    }
  </script>
</body>
</html>

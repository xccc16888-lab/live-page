<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>直播观看（画面内嵌字幕版）</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000; /* 背景全黑 */
      color: #fff;
      text-align: center;
      /* 确保内容垂直居中 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
    }
    
    /* 标题样式，全屏时会隐藏 */
    h1 {
      font-size: 24px;
      margin: 0 0 20px 0;
      color: #ccc;
    }

    /* 播放器和字幕的父容器，用于绝对定位 */
    .video-container {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      border-radius: 10px;
      overflow: hidden; /* 裁剪超出容器的字幕 */
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    /* 全屏状态下的一些特殊处理（针对支持:fullscreen的浏览器） */
    .video-container:fullscreen h1 { display: none; }
    .video-container:-webkit-full-screen h1 { display: none; }

    video {
      width: 100%;
      display: block; /* 消除底部空隙 */
      background: #000;
    }
    
    /* === 核心修改：内嵌滚动字幕容器 === */
    .scroll-container {
      position: absolute; /* 绝对定位 */
      bottom: 10%; /* 距离画面底部 10% 的位置 */
      left: 0;
      width: 100%;
      height: 40px; /* 设置一个固定高度 */
      background: rgba(0, 0, 0, 0.6); /* 半透明黑色背景，确保任何画面下都能看清字 */
      display: flex;
      align-items: center;
      overflow: hidden; /* 隐藏溢出文字 */
      z-index: 10; /* 确保在视频最上层 */
      pointer-events: none; /* 允许鼠标穿透字幕区域，点击视频进行播放/暂停 */
    }

    /* 全屏时稍微把字幕往下移一点，避免遮挡主要内容 */
    .video-container:fullscreen .scroll-container { bottom: 8%; }
    .video-container:-webkit-full-screen .scroll-container { bottom: 8%; }

    /* 滚动字幕文本 */
    .scroll-text {
      position: absolute;
      white-space: nowrap; /* 强制单行 */
      will-change: transform; /* 优化动画性能 */
      animation: marquee 20s linear infinite; /* 20秒滚动一次，无限循环 */
      
      /* 全屏醒目样式 */
      color: #ffcc00; /* 明黄色 */
      font-size: 20px; /* 字体加大 */
      font-weight: bold; /* 加粗 */
      /* 强烈的多重文字阴影，进一步提升清晰度 */
      text-shadow: 
        1px 1px 1px #000,
        -1px -1px 1px #000,
        1px -1px 1px #000,
        -1px 1px 1px #000,
        0px 2px 4px rgba(0,0,0,0.8);
    }

    /* 定义从右向左滚动的动画 */
    @keyframes marquee {
      0% { transform: translateX(100%); } /* 从容器右侧外开始 */
      100% { transform: translateX(-100%); } /* 滚动到容器左侧外 */
    }
  </style>
</head>
<body>
  
  <h1>直播观看</h1>

  <!-- 包含视频和字幕的容器 -->
  <div class="video-container" id="video-container">
    <video id="video" controls autoplay playsinline webkit-playsinline></video>
    
    <!-- 内嵌在画面内的滚动字幕 -->
    <div class="scroll-container">
      <div class="scroll-text">
        下载任小聊 ff1208.com  服务器 vip99  添加 168999  买球不中包赔 
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const container = document.getElementById('video-container');

    // 默认直播源
    const videoSrc = 'https://z.l6j.cn/jQUjqy';

    // 处理全屏逻辑，确保字幕随容器一起全屏
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(() => {});
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // 针对 Safari 和 iOS 原生支持
      video.src = videoSrc;
    } else {
      alert('当前设备不支持播放该直播流');
    }

    // （可选）添加点击视频容器全屏的功能，不仅限于视频内部自带的控件
    // container.addEventListener('click', () => {
    //   if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    //     if (container.requestFullscreen) {
    //       container.requestFullscreen();
    //     } else if (container.webkitRequestFullscreen) {
    //       container.webkitRequestFullscreen();
    //     }
    //   }
    // });
  </script>
</body>
</html>
